<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>convertendo valores</h1>

    <label for="numero">numero</label>
    <input type="text" id="numero">

    <button onclick="capturarnumeros()">capturar</button>

    <script>

        function capturarnumeros() {
            const inputnumero = document.getElementById('numero')

            const numero = Number(inputnumero.value)

            const numerointeiro = Number.parseInt(inputnumero.value)

            const numerodecimal = Number.parseFloat(inputnumero.value)

            console.log(typeof numero)
            console.log(typeof numerointeiro)
            console.log(typeof numerodecimal)
        }

    </script>


</body>

</html>
